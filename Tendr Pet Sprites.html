<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tendr — Pet Sprite Sheet</title>
<meta name="viewport" content="width=1400" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f4ece0; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #2a2118; }
  .dc-card *::-webkit-scrollbar { display: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="pets.jsx"></script>

<script type="text/babel">
const STAGES = ['baby', 'kid', 'teen', 'adult'];
const MOODS  = ['happy', 'content', 'sad', 'sleepy'];
const STAGE_AGE = { baby: 'days 0–7', kid: 'days 8–21', teen: 'days 22–60', adult: 'day 60+' };

const serif = '"Fraunces", serif';
const mono = '"JetBrains Mono", monospace';

function SpeciesSheet({ species, label, accent }) {
  return (
    <div style={{ width: 1180, padding: 32, background: '#f4ece0', boxSizing: 'border-box', fontFamily: 'Inter, sans-serif' }}>
      {/* masthead */}
      <div style={{ borderBottom: '1px solid rgba(42,33,24,0.18)', paddingBottom: 14, marginBottom: 18, display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between' }}>
        <div>
          <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: 3, color: '#8a7a64' }}>SPECIES SHEET · TENDR · NO. 0{species === 'dog' ? '1' : '2'}</div>
          <div style={{ fontFamily: serif, fontSize: 56, letterSpacing: -1.6, lineHeight: 1, marginTop: 6 }}>The {label}.</div>
          <div style={{ fontFamily: serif, fontStyle: 'italic', fontSize: 16, color: '#5a4d3c', marginTop: 6 }}>
            Four ages, four moods. Drawn the way you&rsquo;d sketch a friend in the margin of a notebook.
          </div>
        </div>
        <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: 1.5, color: '#8a7a64', textAlign: 'right' }}>
          STAGES → BABY · KID · TEEN · ADULT<br />
          MOODS  → HAPPY · CONTENT · SAD · SLEEPY
        </div>
      </div>

      {/* Grid — rows = stages, cols = moods */}
      <div style={{ display: 'grid', gridTemplateColumns: '120px repeat(4, 1fr)', gap: 0 }}>
        {/* Header row */}
        <div></div>
        {MOODS.map(m => (
          <div key={m} style={{ padding: '10px 12px', borderBottom: '1px solid rgba(42,33,24,0.18)', fontFamily: mono, fontSize: 10, letterSpacing: 2, color: '#8a7a64', textAlign: 'center' }}>
            {m.toUpperCase()}
          </div>
        ))}

        {/* Stage rows */}
        {STAGES.map((stage, si) => (
          <React.Fragment key={stage}>
            {/* row label */}
            <div style={{
              padding: '20px 12px', borderTop: si === 0 ? 'none' : '1px dashed rgba(42,33,24,0.18)',
              borderRight: '1px solid rgba(42,33,24,0.18)',
              display: 'flex', flexDirection: 'column', justifyContent: 'center',
            }}>
              <div style={{ fontFamily: serif, fontSize: 24, fontStyle: 'italic', color: accent, letterSpacing: -0.4 }}>{stage}</div>
              <div style={{ fontFamily: mono, fontSize: 9, color: '#8a7a64', letterSpacing: 1.5, marginTop: 2 }}>{STAGE_AGE[stage].toUpperCase()}</div>
            </div>
            {MOODS.map((mood, mi) => (
              <div key={mood} style={{
                padding: '20px 0', borderTop: si === 0 ? 'none' : '1px dashed rgba(42,33,24,0.18)',
                borderLeft: mi === 0 ? 'none' : '1px dashed rgba(42,33,24,0.18)',
                background: '#fffaf1',
                display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
                position: 'relative',
              }}>
                <Pet species={species} stage={stage} mood={mood} size={130} />
                <div style={{ fontFamily: serif, fontStyle: 'italic', fontSize: 13, color: '#5a4d3c' }}>
                  {moodCaption(species, stage, mood)}
                </div>
                <div style={{ position: 'absolute', top: 6, left: 8, fontFamily: mono, fontSize: 8, color: '#bca888', letterSpacing: 1 }}>
                  {species[0].toUpperCase()}{stage[0].toUpperCase()}-{mood[0].toUpperCase()}
                </div>
              </div>
            ))}
          </React.Fragment>
        ))}
      </div>

      {/* legend */}
      <div style={{ marginTop: 16, fontFamily: serif, fontStyle: 'italic', fontSize: 13, color: '#5a4d3c', display: 'flex', justifyContent: 'space-between', borderTop: '1px solid rgba(42,33,24,0.18)', paddingTop: 12 }}>
        <span>—— mood floats: ♥ happy · ✦ content · 💧 sad · 𝓏 sleepy ——</span>
        <span style={{ fontFamily: mono, fontSize: 10, color: '#8a7a64', letterSpacing: 1.5 }}>16 SPRITES · {species === 'dog' ? '01/02' : '02/02'}</span>
      </div>
    </div>
  );
}

function moodCaption(sp, st, m) {
  const captions = {
    happy: { dog: ['wiggles', 'wiggle pup', 'tail goes brrr', 'a good boy'], cat: ['mlem', 'purrs', 'high tail', 'queenly'] },
    content: { dog: ['cozy', 'warm bean', 'sun nap', 'all is well'], cat: ['half-loaf', 'bread mode', 'soft eyes', 'observing'] },
    sad: { dog: ['sniffly', 'mopey', 'left out', 'misses you'], cat: ['ignoring', 'hungry', 'rainy day', 'unimpressed'] },
    sleepy: { dog: ['dozing', 'snoozin', 'dreams of treats', 'old bones'], cat: ['catnap', 'fully asleep', 'drowsy', 'lazy regent'] },
  };
  const i = STAGES.indexOf(st);
  return captions[m][sp][i];
}

// One in-context preview — pet plugged into a Tendr "today" card
function InContextCard() {
  const t = {
    paper: '#f4ece0', card: '#fffaf1', ink: '#2a2118', inkSoft: '#5a4d3c',
    muted: '#8a7a64', accent: '#c94e3a', accent2: '#5b7a4c', amber: '#c08a2a',
    rule: 'rgba(42,33,24,0.18)', paperDeep: '#ead9c1',
  };
  return (
    <div style={{ width: 360, background: t.card, border: `1px solid ${t.rule}`, padding: 22, fontFamily: 'Inter, sans-serif', boxShadow: '4px 6px 0 rgba(42,33,24,0.08)', transform: 'rotate(1.4deg)' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: mono, fontSize: 10, color: t.muted, letterSpacing: 2, marginBottom: 12 }}>
        <span>TUE · 21 APR</span><span>DAY 014</span>
      </div>
      <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 8 }}>
        <Pet species="cat" stage="kid" mood="content" size={170} />
      </div>
      <div style={{ fontFamily: serif, fontSize: 22, textAlign: 'center', fontStyle: 'italic' }}>Mochi is content.</div>
      <div style={{ fontFamily: 'Inter, sans-serif', fontSize: 12, color: t.inkSoft, textAlign: 'center', marginTop: 4, marginBottom: 14 }}>
        kid stage · 14 days with you
      </div>
      <div style={{ borderTop: `1px dashed ${t.rule}`, paddingTop: 12 }}>
        {[['Mood', 72, t.accent], ['Belly', 69, t.accent2], ['Bond', 85, t.amber]].map(([l, v, c]) => (
          <div key={l} style={{ display: 'grid', gridTemplateColumns: '60px 1fr 28px', alignItems: 'center', gap: 10, marginBottom: 7 }}>
            <div style={{ fontFamily: serif, fontSize: 13, fontStyle: 'italic', color: t.inkSoft }}>{l}</div>
            <div style={{ height: 5, background: t.paperDeep, borderRadius: 3, overflow: 'hidden' }}>
              <div style={{ width: `${v}%`, height: '100%', background: c }} />
            </div>
            <div style={{ fontFamily: mono, fontSize: 10, color: t.muted, textAlign: 'right' }}>{v}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// Lifecycle strip — show one mood across all 4 stages, both species
function LifecycleStrip({ species, label, mood = 'content' }) {
  return (
    <div style={{ width: 1180, padding: '24px 32px', background: '#f4ece0', boxSizing: 'border-box' }}>
      <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: 2, color: '#8a7a64', marginBottom: 4 }}>LIFECYCLE · {species.toUpperCase()} · MOOD: {mood.toUpperCase()}</div>
      <div style={{ fontFamily: serif, fontSize: 28, fontStyle: 'italic', letterSpacing: -0.5, marginBottom: 16 }}>{label} grows up.</div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
        {STAGES.map((stage, i) => (
          <div key={stage} style={{ background: '#fffaf1', border: '1px solid rgba(42,33,24,0.18)', padding: 18, textAlign: 'center', position: 'relative' }}>
            <Pet species={species} stage={stage} mood={mood} size={150} />
            <div style={{ fontFamily: serif, fontSize: 20, fontStyle: 'italic', color: '#c94e3a', letterSpacing: -0.4, marginTop: 4 }}>{stage}</div>
            <div style={{ fontFamily: mono, fontSize: 9, color: '#8a7a64', letterSpacing: 1.5 }}>{STAGE_AGE[stage].toUpperCase()}</div>
            {i < 3 && (
              <div style={{ position: 'absolute', right: -12, top: '40%', fontFamily: serif, fontStyle: 'italic', fontSize: 22, color: '#8a7a64' }}>→</div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="dog" title="The Dog · 16 sprites" subtitle="Stages run vertically, moods across. Each cell is the pet at that age & feeling. Drawn ink + watercolor — matches the journal aesthetic.">
        <DCArtboard id="dog-sheet" label="Dog · full sheet" width={1180} height={920}>
          <SpeciesSheet species="dog" label="Dog" accent="#c94e3a" />
        </DCArtboard>
      </DCSection>

      <DCSection id="cat" title="The Cat · 16 sprites" subtitle="Same grid, second species. Cats lean leaner & more upright as they age; tail curves carry the mood.">
        <DCArtboard id="cat-sheet" label="Cat · full sheet" width={1180} height={920}>
          <SpeciesSheet species="cat" label="Cat" accent="#5b7a4c" />
        </DCArtboard>
      </DCSection>

      <DCSection id="lifecycle" title="Lifecycle strips" subtitle="Same mood across stages. Useful as the 'evolution' animation when a pet ages up.">
        <DCArtboard id="dog-life" label="Dog · happy across stages" width={1180} height={290}>
          <LifecycleStrip species="dog" label="Biscuit" mood="happy" />
        </DCArtboard>
        <DCArtboard id="cat-life" label="Cat · sleepy across stages" width={1180} height={290}>
          <LifecycleStrip species="cat" label="Mochi" mood="sleepy" />
        </DCArtboard>
      </DCSection>

      <DCSection id="context" title="In context" subtitle="One sprite plugged into the Tendr 'today' card so you can see scale + composition.">
        <DCArtboard id="ctx-card" label="Pet card · in situ" width={460} height={520}>
          <div style={{ background: '#f4ece0', width: 460, height: 520, padding: 50, boxSizing: 'border-box', display: 'flex', justifyContent: 'center' }}>
            <InContextCard />
          </div>
        </DCArtboard>
        <DCPostIt top={-40} right={-40} rotate={-2} width={230}>
          The pet sits where the teacup-mochi did. All 32 sprites slot in identically — just swap species/stage/mood props.
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
